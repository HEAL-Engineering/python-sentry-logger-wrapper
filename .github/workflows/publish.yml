name: Publish to PyPI

on:
  push:
    tags:
      - "v*"          # Releases are cut by pushing an annotated tag (e.g. v0.2.0).
  workflow_dispatch:  # Escape hatch: manual re-run from the Actions UI.

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi   # Gates the run on a manual approval (configured on the environment).
    permissions:
      id-token: write   # Required for PyPI trusted publishing (OIDC).

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools-scm needs full history + tags to derive the version.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify built version matches the tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          built=$(ls dist/*.whl | sed -E 's|.*/[^-]+-([^-]+)-.*|\1|' | head -n1)
          echo "Tag version:   $tag"
          echo "Built version: $built"
          test "$tag" = "$built"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
