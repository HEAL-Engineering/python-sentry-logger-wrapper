name: Lint

on:
  workflow_call:
  pull_request:
    branches: [main]
    paths:
      - "python_sentry_logger_wrapper/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/lint.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Failure hint
        if: failure()
        run: |
          echo "::error::Lint failed. Run locally to auto-fix:"
          echo "::error::  uv run ruff check --fix . && uv run ruff format ."
